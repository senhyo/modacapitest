services:
  - type: web
    name: modacapitest
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
      - key: OPENAI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
      - key: APP_PASSWORD
        sync: false   # 입장 비밀번호 — 대시보드에서 직접 입력
      - key: OPENAI_MODEL
        value: gpt-4o
